<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library AI – Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--color-surface-soft); }
    .login-page-wrap { width: 100%; display: flex; align-items: center; justify-content: center; padding: var(--space-xl); }
    .login-card { animation: fadeUp 0.35s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    .login-hint {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: var(--rounded-md);
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 500;
      color: #1e40af;
      text-align: center;
      line-height: 1.6;
      margin-top: 4px;
    }
    .login-hint strong { font-weight: 700; }
    [data-theme="dark"] .login-hint { background: rgba(59,130,246,.12); border-color: rgba(59,130,246,.3); color: #93c5fd; }
    [data-theme="dark"] body { background: var(--color-canvas); }
    .theme-toggle-wrap { position: fixed; top: 16px; right: 16px; }
  </style>
</head>
<body>

  <div class="theme-toggle-wrap">
    <button class="btn-icon-circular" id="themeToggle" aria-label="Toggle theme" title="Toggle dark/light">
      <svg id="themeIconLight" width="16" height="16" viewBox="0 0 20 20" fill="none">
        <circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="1.8"/>
        <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.22 4.22l1.42 1.42M14.36 14.36l1.42 1.42M4.22 15.78l1.42-1.42M14.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <svg id="themeIconDark" class="hidden" width="16" height="16" viewBox="0 0 20 20" fill="none">
        <path d="M17.293 13.293A8 8 0 0 1 6.707 2.707a8.001 8.001 0 1 0 10.586 10.586z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <div class="login-page-wrap">
    <div class="login-card">

      <div class="login-brand">
        <svg width="40" height="40" viewBox="0 0 32 32" fill="none" aria-hidden="true">
          <rect width="32" height="32" rx="8" fill="#1a56db"/>
          <rect x="8" y="7" width="11" height="18" rx="2" fill="#fff"/>
          <rect x="10" y="7" width="9" height="18" rx="1.5" fill="#dbeafe"/>
          <path d="M10 11h5M10 14h5M10 17h3" stroke="#1a56db" stroke-width="1.2" stroke-linecap="round"/>
          <rect x="18" y="9" width="6" height="16" rx="1.5" fill="#fff" opacity=".85"/>
        </svg>
        <span class="login-brand__name">Library <span style="color:var(--color-primary)">AI</span></span>
      </div>

      <h1 class="login-title" id="loginTitle">Student Sign In</h1>
      <p class="login-sub">Enter your Student ID and password to access the library</p>

      <div class="login-hint">
        <strong>Demo credentials:</strong><br>
        Student ID: <strong>1234</strong> &nbsp;·&nbsp; Password: <strong>1234</strong>
      </div>

      <div id="loginError" class="login-error hidden"></div>

      <form id="loginForm" class="login-form" novalidate>
        <label class="field-label" for="loginStudentId">Student ID</label>
        <input id="loginStudentId" class="field-input" type="text"
               placeholder="e.g. 1234 or S00123"
               autocomplete="username" required />

        <label class="field-label" for="loginPassword">Password</label>
        <input id="loginPassword" class="field-input" type="password"
               placeholder="••••••••" autocomplete="current-password" required />

        <button type="submit" class="btn-primary btn-primary--full" id="loginBtn">Sign in</button>
      </form>

      <p class="login-footer">
        Secured by <strong>Firebase Authentication</strong>
      </p>
    </div>
  </div>

  {{ firebase_config_script | safe }}
  <script type="module" src="/js/login-auth.js"></script>
  <script>
    const html = document.documentElement;
    const tToggle = document.getElementById("themeToggle");
    const tLight  = document.getElementById("themeIconLight");
    const tDark   = document.getElementById("themeIconDark");
    function applyTheme(t) {
      html.setAttribute("data-theme", t);
      tLight.classList.toggle("hidden", t === "dark");
      tDark.classList.toggle("hidden",  t !== "dark");
    }
    applyTheme(localStorage.getItem("theme") || "light");
    tToggle.addEventListener("click", () => {
      const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
      applyTheme(next);
      localStorage.setItem("theme", next);
    });
  </script>
</body>
</html>
